# ===================================================================
# CONFIGURATION DE L'APPLICATION
# ===================================================================

# Nom de l'application
spring.application.name=plateforme-reservation-backend

# Port du serveur
server.port=8080

# ===================================================================
# CONFIGURATION BASE DE DONNÉES MYSQL
# ===================================================================

# URL de connexion (crée la base si elle n'existe pas)
spring.datasource.url=jdbc:mysql://localhost:3306/reservation_touristique?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# Nom d'utilisateur MySQL
spring.datasource.username=root

# Mot de passe MySQL (REMPLACER par votre mot de passe)
spring.datasource.password=root

# Driver JDBC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURATION JPA / HIBERNATE
# ===================================================================

# Création/mise à jour automatique des tables
# update = met à jour la structure sans perdre les données
spring.jpa.hibernate.ddl-auto=update

# Afficher les requêtes SQL dans la console
spring.jpa.show-sql=true

# Formater les requêtes SQL pour mieux les lire
spring.jpa.properties.hibernate.format_sql=true

# Dialecte MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# CONFIGURATION JWT (SÉCURITÉ)
# ===================================================================

# Clé secrète pour signer les tokens JWT
jwt.secret=CleSecreteSuperComplexePourLaPlateformeDeReservationTouristique2024

# Durée de validité d'un token (24 heures en millisecondes)
jwt.expiration=86400000

# Durée de validité du refresh token (7 jours)
jwt.refresh-expiration=604800000

# ===================================================================
# CONFIGURATION UPLOAD DE FICHIERS
# ===================================================================

# Activer l'upload de fichiers
spring.servlet.multipart.enabled=true

# Taille maximale d'un fichier
spring.servlet.multipart.max-file-size=10MB

# Taille maximale d'une requête
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# CONFIGURATION LOGS
# ===================================================================

# Niveau de logs pour notre application
logging.level.com.reservationtouristique=DEBUG

# Niveau de logs pour Spring
logging.level.org.springframework.web=INFO

# Niveau de logs pour Hibernate SQL
logging.level.org.hibernate.SQL=DEBUG

# ===================================================================
# CONFIGURATION CORS (Communication avec le frontend)
# ===================================================================

# Origines autorisées (frontend)
cors.origines-autorisees=http://localhost:3000,http://localhost:3001

# ===================================================================
# CONFIGURATION PAGINATION
# ===================================================================

# Nombre d'éléments par page par défaut
pagination.taille-par-defaut=10

# Taille maximale d'une page
pagination.taille-maximale=100